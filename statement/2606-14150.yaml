climate_reality: >
  Accumulated structure is not equivalent to zero. Useful capabilities
  can persist through revision, provided they are evaluated under
  measurable constraints.

climate_democracy: >
  Engineering decisions should distinguish between reset and revision,
  documenting which structures are preserved, discarded, and justified
  through transparent evaluation.

